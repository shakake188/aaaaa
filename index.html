<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — حاسبة الشاحنات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--surface:#131920;--card:#1a2230;--border:#2a3545;--accent:#f5a623;--green:#3ecf72;--red:#f85149;--blue:#60b0ff;--text:#e8eef5;--muted:#7a8a9a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;}
.wrap{max-width:500px;margin:0 auto;}
header{text-align:center;padding:24px 0 20px;}
header h1{font-size:22px;font-weight:900;color:var(--accent);}
header p{font-size:12px;color:var(--muted);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;}
input:focus,select:focus{border-color:var(--accent);}
.btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;border:none;font-family:'Cairo',sans-serif;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#e06b00);color:#000;margin-top:4px;}
.btn-sm{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.25);width:auto;padding:5px 10px;font-size:11px;border-radius:6px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;}
.btn-copy{background:rgba(245,166,35,.1);color:var(--accent);border:1px solid rgba(245,166,35,.3);width:auto;padding:5px 12px;font-size:11px;border-radius:6px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;}
.result-box{background:rgba(245,166,35,.08);border:2px solid var(--accent);border-radius:12px;padding:20px;text-align:center;margin-top:12px;}
.result-code{font-size:34px;font-weight:900;color:var(--accent);letter-spacing:4px;margin:8px 0;}
.result-label{font-size:11px;color:var(--muted);}
.sub-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(42,53,69,.5);}
.sub-row:last-child{border-bottom:none;}
.sub-name{font-size:13px;font-weight:700;}
.sub-info{font-size:11px;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.badge-green{background:rgba(62,207,114,.15);color:var(--green);}
.badge-red{background:rgba(248,81,73,.15);color:var(--red);}
.msg{padding:10px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none;text-align:center;background:rgba(62,207,114,.1);border:1px solid rgba(62,207,114,.3);color:var(--green);}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:320px;text-align:center;}
#login-pass{text-align:center;font-size:18px;letter-spacing:3px;margin-bottom:10px;}
#login-err{color:var(--red);font-size:12px;margin-bottom:8px;display:none;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="font-size:50px;margin-bottom:12px">🔐</div>
    <h2 style="font-size:20px;font-weight:900;color:var(--accent);margin-bottom:6px">لوحة التحكم</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:20px">للمالك فقط</p>
    <input type="password" id="login-pass" placeholder="كلمة السر" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-err">❌ كلمة السر غلط</div>
    <button class="btn btn-primary" onclick="doLogin()">دخول</button>
  </div>
</div>

<div class="wrap">
  <header>
    <div style="font-size:44px">⚙️</div>
    <h1>لوحة التحكم</h1>
    <p>إدارة كودات التفعيل</p>
  </header>

  <div id="msg" class="msg"></div>

  <div class="card">
    <div class="card-title">🔑 توليد كود لزبون</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>الشهر</label><select id="sel-month"></select></div>
      <div class="field"><label>السنة</label><select id="sel-year"></select></div>
    </div>
    <div class="field"><label>اسم الزبون</label><input type="text" id="sub-name" placeholder="مثال: أبو محمد"></div>
    <button class="btn btn-primary" onclick="generateCode()">⚡ ولّد الكود</button>
    <div class="result-box" id="result-box" style="display:none">
      <div class="result-label" id="result-label"></div>
      <div class="result-code" id="result-code"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap">
        <button class="btn-copy" onclick="copyCode()">📋 نسخ الكود</button>
        <button class="btn-copy" onclick="saveSubscriber()">💾 حفظ بالقائمة</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">👥 الزبائن</div>
      <span id="sub-count" style="font-size:11px;color:var(--muted)"></span>
    </div>
    <div id="subs-list"><div style="text-align:center;color:var(--muted);font-size:12px;padding:10px">ما في زبائن بعد</div></div>
  </div>

  <div class="card">
    <div class="card-title">📅 كودات هذي السنة</div>
    <div id="year-table"></div>
  </div>
</div>

<script>
const PASS = 'truck2026';
const SECRET = 4721;
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const SKEY = 'admin_subs_v1';

function doLogin(){
  if(document.getElementById('login-pass').value===PASS){
    document.getElementById('login-screen').style.display='none';
    sessionStorage.setItem('adm','1');
    init();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('login-pass').value='';
  }
}

function genCode(m,y){
  return ((m*7+y*13+SECRET*31)%89999+10000)+'-'+((m*11+y*7+SECRET*17)%8999+1000);
}

let curCode='';

function generateCode(){
  const m=+document.getElementById('sel-month').value;
  const y=+document.getElementById('sel-year').value;
  curCode=genCode(m,y);
  document.getElementById('result-label').textContent=MONTHS[m-1]+' '+y;
  document.getElementById('result-code').textContent=curCode;
  document.getElementById('result-box').style.display='block';
}

function copyCode(){
  navigator.clipboard.writeText(curCode).then(()=>showMsg('✅ تم نسخ: '+curCode)).catch(()=>alert(curCode));
}

function saveSubscriber(){
  const name=document.getElementById('sub-name').value.trim()||'زبون';
  const m=+document.getElementById('sel-month').value;
  const y=+document.getElementById('sel-year').value;
  const subs=getSubs();
  subs.unshift({id:Date.now(),name,month:m,year:y,code:curCode,date:new Date().toLocaleDateString('ar-IQ')});
  saveSubs(subs);
  renderSubs();
  showMsg('✅ تم حفظ '+name);
  document.getElementById('sub-name').value='';
}

function getSubs(){try{return JSON.parse(localStorage.getItem(SKEY))||[];}catch(e){return[];}}
function saveSubs(s){localStorage.setItem(SKEY,JSON.stringify(s));}

function deleteSub(id){
  if(!confirm('تحذف هذا الزبون؟'))return;
  saveSubs(getSubs().filter(s=>s.id!==id));
  renderSubs();
}

function renderSubs(){
  const subs=getSubs();
  document.getElementById('sub-count').textContent=subs.length+' زبون';
  const el=document.getElementById('subs-list');
  if(!subs.length){el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:10px">ما في زبائن بعد</div>';return;}
  const now=new Date();
  el.innerHTML=subs.map(s=>{
    const active=s.year>now.getFullYear()||(s.year===now.getFullYear()&&s.month>=now.getMonth()+1);
    return `<div class="sub-row">
      <div>
        <div class="sub-name">${s.name}</div>
        <div class="sub-info">${MONTHS[s.month-1]} ${s.year} &nbsp;|&nbsp; <strong style="color:var(--accent)">${s.code}</strong></div>
        <div class="sub-info">أضيف: ${s.date}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="badge ${active?'badge-green':'badge-red'}">${active?'نشط':'منتهي'}</span>
        <div style="display:flex;gap:4px">
          <button class="btn-copy" onclick="navigator.clipboard.writeText('${s.code}').then(()=>showMsg('✅ تم النسخ'))">📋</button>
          <button class="btn-sm" onclick="deleteSub(${s.id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildYearTable(){
  const now=new Date(),y=now.getFullYear(),cm=now.getMonth()+1;
  document.getElementById('year-table').innerHTML=Array.from({length:12},(_,i)=>{
    const m=i+1,code=genCode(m,y),cur=m===cm;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px ${cur?'8px':'0'};border-bottom:1px solid rgba(42,53,69,.4);${cur?'background:rgba(245,166,35,.05);border-radius:6px':''}">
      <div style="font-size:12px;${cur?'font-weight:800;color:var(--accent)':''}">${m} — ${MONTHS[m-1]}${cur?' 📍':''}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;font-weight:800;color:var(--accent);letter-spacing:2px">${code}</span>
        <button class="btn-copy" onclick="navigator.clipboard.writeText('${code}').then(()=>showMsg('✅ تم النسخ'))">📋</button>
      </div>
    </div>`;
  }).join('');
}

function showMsg(t){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

function init(){
  const selM=document.getElementById('sel-month');
  MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=(i+1)+' — '+m;selM.appendChild(o);});
  const now=new Date();
  selM.value=now.getMonth()+1;
  const selY=document.getElementById('sel-year');
  for(let y=now.getFullYear();y<=now.getFullYear()+2;y++){const o=document.createElement('option');o.value=y;o.textContent=y;selY.appendChild(o);}
  renderSubs();
  buildYearTable();
  generateCode();
}

document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('adm')==='1'){
    document.getElementById('login-screen').style.display='none';
    init();
  }
});
</script>
</body>
</html>
